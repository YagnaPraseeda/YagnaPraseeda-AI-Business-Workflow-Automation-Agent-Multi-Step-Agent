services:
  - type: web
    name: ai-workflow-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard
      - key: MODEL
        value: llama-3.3-70b-versatile
      - key: MAX_TOKENS
        value: "4096"
      - key: UPLOAD_DIR
        value: uploads
      - key: REPORTS_DIR
        value: reports
